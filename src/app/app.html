<main>
  <div class="info">
    <a href="https://www.music-theory-for-musicians.com/nashville-number-system.html" target="_blank">
      <mat-icon>help</mat-icon>
    </a>
  </div>
  <h1 class="title">Nashville Number system Memorizer <span class="title-note">♪</span></h1>
  
  @switch(step()){
    @case(1){
      <p class="instruction">
        Choose the <span class="key">key</span> you want to memorize:
      </p> 
      <app-selectable [selected]="selectedKey()" type="Key" [options]="keys()" (selectOption)="onSelectOption($event)" />
      
    }
    @case(2){
      <div class="degrees-keys-sheet">
        <p class="instruction">
          You have <span class="number">{{ intervalCount() }}</span> seconds to memorize this:
        </p> 
        <app-degrees-keys-sheet />
      </div>
    }
    @case (3){
      <app-q-and-a />
    }
    @case (4){
      <app-score-screen />
    }
  }
</main>
