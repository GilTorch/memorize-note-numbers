<p class="instruction">
    You have <span class="number">{{ count() }}</span> seconds to choose the <span class="degree">degree</span> that is associated to the key of: <span class="key">{{ selectedKey() }}</span>
</p>
<div class="wrapper">
    <div class="degree-key">
        @let degree = randomDegree();
        @if(degree){
            <app-degree-key degree="?" [key]="degree[1]" />
        }
    </div>
    <div class="selectable">
        <app-selectable type="Degree" [options]="degrees()" />
    </div>
    <p>
        Score: <span class="number">{{ score() }}</span> / 7
    </p>
</div>
