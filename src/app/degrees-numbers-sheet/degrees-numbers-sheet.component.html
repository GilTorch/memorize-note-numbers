
<div class="degrees-numbers">
    @for(degree of degreesNumbersList(); track degree){
        <div class="degree-number">
           <div class="degree">
            {{ degree[1] }}
           </div>
           <mat-icon class="double-arrow" aria-hidden="false" aria-label="double arrow icon" fontIcon="swap_vert"></mat-icon>
           <div class="number">
            {{ degree[0] }}
           </div>
        </div>
    }
</div>
